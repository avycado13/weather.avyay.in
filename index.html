<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>
    <h1>Weather</h1>
    <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            Unit
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#" onclick="setUnit('standard')">Standard</a></li>
            <li><a class="dropdown-item" href="#" onclick="setUnit('metric')">Metric</a></li>
            <li><a class="dropdown-item" href="#" onclick="setUnit('imperial')">Imperial</a></li>
        </ul>
    </div>
    <form id="weatherForm" onsubmit="getWeather(event)">
        <div class="mb-3">
            <label for="locationInput" class="form-label">Location</label>
            <input type="text" class="form-control" id="locationInput" required>
        </div>
        <button type="submit" class="btn btn-primary">Get Weather</button>
    </form>
    <div id="weatherResult"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
        let unit = 'standard';

        function setUnit(selectedUnit) {
            unit = selectedUnit;
        }

        function getWeather(event) {
            event.preventDefault();
            const location = document.getElementById('locationInput').value;
            const apiKey = 'e2840cf5d3b62985452f355f60eae3ff'; // Replace with your OpenWeatherMap API key

            // Geocoding API request
            fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${location}&limit=1&appid=${apiKey}`)
                .then(response => console.log(response.json()))
                .then(data => {
                    const { lat, lon } = data[zip];
                    getWeatherData(lat, lon);
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        function getWeatherData(lat, lon) {
            const apiKey = 'e2840cf5d3b62985452f355f60eae3ff'; // Replace with your OpenWeatherMap API key

            // Weather API request
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=${unit}&appid=${apiKey}`)
                .then(response => response.json())
                .then(data => {
                    const weatherResult = document.getElementById('weatherResult');
                    weatherResult.innerHTML = `
                        <h2>Weather in ${data.name}</h2>
                        <p>Temperature: ${data.main.temp} ${unit === 'metric' ? '°C' : '°F'}</p>
                        <p>Description: ${data.weather[0].description}</p>
                    `;
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
